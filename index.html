<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
        }
        #editor {
            width: 100%;
            height: 80vh;
            border: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
        }
        .hidden {
            display: none;
        }
        .menu {
            background: #333;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }
        .menu button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }
        .dark-mode {
            background-color: #222;
            color: #eee;
        }
    </style>
</head>
<body>
    <div class="menu">
        <div>
            <button onclick="newDocument()">New</button>
            <button onclick="saveFile()">Save</button>
            <button onclick="openFile()">Open</button>
            <button onclick="printDocument()">Print</button>
        </div>
        <div>
            <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
        </div>
        <div id="count-display">
            Words: <span id="word-count">0</span>
            Characters: <span id="char-count">0</span>
        </div>
    </div>
    <textarea id="editor" placeholder="Type your notes here..." oninput="updateCounts()"></textarea>
    <script>
        let darkMode = false;

        function newDocument() {
            document.getElementById('editor').value = '';
            updateCounts();
        }

        function saveFile() {
            const blob = new Blob([document.getElementById('editor').value], {type: 'text/plain'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'document.txt';
            link.click();
        }

        function openFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = () => {
                    document.getElementById('editor').value = reader.result;
                    updateCounts();
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function printDocument() {
            window.print();
        }

        function toggleDarkMode() {
            darkMode = !darkMode;
            document.body.classList.toggle('dark-mode', darkMode);
        }

        function updateCounts() {
            const text = document.getElementById('editor').value;
            document.getElementById('word-count').innerText = text.split(/\\s+/).filter(word => word.length > 0).length;
            document.getElementById('char-count').innerText = text.length;
        }

        // Auto-save functionality
        window.onbeforeunload = function() {
            localStorage.setItem('autosave', document.getElementById('editor').value);
        };

        window.onload = function() {
            const autosave = localStorage.getItem('autosave');
            if (autosave) {
                document.getElementById('editor').value = autosave;
                updateCounts();
            }
        };
    </script>
</body>
</html>
